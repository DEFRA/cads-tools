#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

# Listen on all interfaces (Docker needs this)
listen_addresses = '*'

# Maximum number of concurrent connections
max_connections = 100

#------------------------------------------------------------------------------
# FILE LOCATIONS
#------------------------------------------------------------------------------

# Load pg_hba.conf from the shared config directory
hba_file = '/etc/postgres-config/pg_hba.conf'

# Optional: allow additional config files in this directory
include_dir = 'conf.d'

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------

# Log minimal useful information
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_statement = 'none'

#------------------------------------------------------------------------------
# MEMORY (safe defaults for dev)
#------------------------------------------------------------------------------

shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB

#------------------------------------------------------------------------------
# WRITE-AHEAD LOG (WAL)
#------------------------------------------------------------------------------

wal_level = replica
synchronous_commit = on
checkpoint_timeout = 5min

#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------

client_encoding = 'UTF8'
timezone = 'UTC'