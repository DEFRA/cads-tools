- ClientId: "local-cads-mis"
  ClientSecrets:
    - "local-mock-secret"
  AllowedGrantTypes:
    - "authorization_code"
  RequirePkce: false
  RedirectUris: ["http://localhost:3000", "http://localhost:3000/auth/callback", "http://localhost:3000/auth/sign-out", "http://localhost:3000/account/signed-out"]
  PostLogoutRedirectUris:
    - "http://localhost:3000/"
  AllowedScopes:
    - "openid"
    - "profile"
    - "email"
    - "offline_access"
    - "api://local-azure-client-id/reports.read"
  AllowOfflineAccess: true
  AllowAccessTokensViaBrowser: true
  AccessTokenType: "Jwt"
  AlwaysSendClientClaims: true
  ClientClaimsPrefix: ""